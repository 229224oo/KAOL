<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考拉传奇人生 - 链上传奇DApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
      min-height: 100vh;
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(138, 43, 226, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(255, 69, 0, 0.15) 0%, transparent 50%),
        linear-gradient(180deg, #0a0a0f 0%, #1a0a1f 50%, #0f0a15 100%);
      color: #e0e0e0;
      overflow-x: hidden;
    }

    /* 导航栏 */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(0, 0, 0, 0.8);
      border-bottom: 1px solid rgba(255, 215, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .nav-logo {
      font-size: 20px;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .nav-wallet {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .lang-selector {
      padding: 6px 12px;
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 5px;
      color: #ffd700;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    .lang-selector:hover {
      border-color: #ffd700;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .wallet-address {
      font-size: 12px;
      color: #ffd700;
      font-family: monospace;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-connect {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #000;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
    }

    .btn-connect:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff6b00, #ff4500);
      color: #fff;
      box-shadow: 0 0 15px rgba(255, 107, 0, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 107, 0, 0.5);
    }

    .btn-partner {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
    }

    .btn-partner:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(34, 197, 94, 0.5);
    }

    .btn-game {
      background: linear-gradient(135deg, #4a0080, #8000ff);
      color: #fff;
      box-shadow: 0 0 15px rgba(128, 0, 255, 0.3);
    }

    .btn-game:hover {
      box-shadow: 0 5px 25px rgba(128, 0, 255, 0.5);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* 主内容区 */
    .main-container {
      margin-top: 80px;
      padding: 20px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    /* 状态卡片 */
    .status-card {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 15px;
      padding: 20px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .status-header {
      font-size: 18px;
      font-weight: bold;
      color: #ffd700;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-header::before {
      content: '⚡';
    }

    .balance-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .balance-item {
      background: rgba(255, 215, 0, 0.1);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .balance-label {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 5px;
    }

    .balance-value {
      font-size: 20px;
      font-weight: bold;
      color: #ffd700;
      font-family: monospace;
    }

    /* 充值区域 */
    .recharge-section {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 15px;
      padding: 25px;
      border: 1px solid rgba(255, 69, 0, 0.3);
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      color: #ff6b00;
      margin-bottom: 20px;
      text-align: center;
      text-shadow: 0 0 15px rgba(255, 107, 0, 0.5);
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-label {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 8px;
      display: block;
    }

    .input-field {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.5);
      color: #ffd700;
      font-size: 14px;
      font-family: monospace;
    }

    .input-field:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .presets {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 8px 15px;
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 5px;
      color: #ffd700;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .preset-btn:hover {
      background: rgba(255, 215, 0, 0.2);
      border-color: #ffd700;
    }

    .preset-btn.active {
      background: #ffd700;
      color: #000;
    }

    /* 地推合伙人区域 */
    .partner-section {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 15px;
      padding: 25px;
      border: 1px solid rgba(34, 197, 94, 0.3);
      margin-bottom: 20px;
    }

    .partner-section .section-title {
      color: #22c55e;
      text-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
    }

    .partner-info {
      background: rgba(34, 197, 94, 0.1);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      border: 1px solid rgba(34, 197, 94, 0.2);
      text-align: center;
    }

    .partner-price {
      font-size: 24px;
      font-weight: bold;
      color: #22c55e;
    }

    .partner-desc {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 5px;
    }

    /* 游戏区域 */
    .game-section {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 15px;
      padding: 25px;
      border: 1px solid rgba(128, 0, 255, 0.3);
      margin-bottom: 20px;
    }

    .game-title {
      font-size: 20px;
      font-weight: bold;
      color: #ffd700;
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .game-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .game-tab {
      padding: 10px 20px;
      background: rgba(128, 0, 255, 0.1);
      border: 1px solid rgba(128, 0, 255, 0.3);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .game-tab:hover {
      background: rgba(128, 0, 255, 0.2);
    }

    .game-tab.active {
      background: linear-gradient(135deg, #8000ff, #4a0080);
      color: #fff;
      border-color: #8000ff;
      box-shadow: 0 0 15px rgba(128, 0, 255, 0.5);
    }

    .game-panel {
      display: none;
    }

    .game-panel.active {
      display: block;
    }

    /* 装备合成 */
    .equipment-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .equipment-item {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      border: 1px solid rgba(255, 215, 0, 0.15);
      transition: all 0.3s;
      cursor: pointer;
    }

    .equipment-item:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 215, 0, 0.4);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2);
    }

    .equipment-item.disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .equipment-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .equipment-name {
      font-size: 14px;
      font-weight: bold;
      color: #ffd700;
      margin-bottom: 5px;
    }

    .equipment-cost {
      font-size: 12px;
      color: #ff8c00;
    }

    .equipment-level {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 5px;
    }

    /* 任务系统 */
    .quest-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .quest-item {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      padding: 15px;
      border: 1px solid rgba(255, 69, 0, 0.2);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .quest-icon {
      font-size: 28px;
      width: 50px;
      text-align: center;
    }

    .quest-info {
      flex: 1;
    }

    .quest-name {
      font-size: 14px;
      font-weight: bold;
      color: #ff6b00;
      margin-bottom: 5px;
    }

    .quest-desc {
      font-size: 12px;
      color: #9ca3af;
    }

    .quest-reward {
      font-size: 12px;
      color: #ffd700;
      margin-top: 5px;
    }

    .quest-action {
      padding: 8px 15px;
      background: linear-gradient(135deg, #ff6b00, #ff4500);
      border: none;
      border-radius: 5px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }

    .quest-action:hover {
      box-shadow: 0 0 10px rgba(255, 107, 0, 0.5);
    }

    .quest-action.disabled {
      background: rgba(100, 100, 100, 0.5);
      color: #9ca3af;
      cursor: not-allowed;
    }

    /* 角色信息 */
    .character-section {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 15px;
      padding: 20px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      margin-bottom: 20px;
    }

    .character-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .character-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd700, #ff6b00);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .character-name {
      font-size: 16px;
      font-weight: bold;
      color: #ffd700;
    }

    .character-level {
      font-size: 12px;
      color: #ff8c00;
    }

    .character-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .stat-item {
      background: rgba(255, 215, 0, 0.05);
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #9ca3af;
    }

    .stat-value {
      font-size: 16px;
      font-weight: bold;
      color: #ffd700;
    }

    /* 装备栏 */
    .inventory-section {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 15px;
      padding: 20px;
      border: 1px solid rgba(128, 0, 255, 0.2);
    }

    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    .inventory-slot {
      width: 50px;
      height: 50px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s;
    }

    .inventory-slot:hover {
      border-color: #ffd700;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .inventory-slot.empty {
      border-color: rgba(100, 100, 100, 0.3);
    }

    /* 消息提示 */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      padding: 15px 30px;
      border-radius: 10px;
      border: 1px solid #ffd700;
      color: #ffd700;
      font-size: 14px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .toast.show {
      opacity: 1;
    }

    .toast.success {
      border-color: #22c55e;
      color: #22c55e;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
    }

    .toast.error {
      border-color: #ef4444;
      color: #ef4444;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
    }

    /* 加载动画 */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 215, 0, 0.3);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 战斗界面 */
    .battle-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, #1a0a1f 0%, #0a0a0f 100%);
      z-index: 4000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .battle-screen.show {
      display: flex;
    }

    .battle-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(ellipse at 30% 70%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 30%, rgba(255, 69, 0, 0.1) 0%, transparent 50%);
      animation: pulseBg 3s ease-in-out infinite;
    }

    @keyframes pulseBg {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .battle-title {
      position: absolute;
      top: 30px;
      font-size: 24px;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      animation: fadeInDown 0.5s ease-out;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .battle-arena {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 80%;
      max-width: 600px;
      position: relative;
      z-index: 10;
    }

    .battle-character {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 150px;
    }

    .character-sprite {
      font-size: 80px;
      margin-bottom: 15px;
      animation: idle 2s ease-in-out infinite;
    }

    .boss-sprite {
      font-size: 100px;
      margin-bottom: 15px;
      animation: bossIdle 3s ease-in-out infinite;
    }

    @keyframes idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes bossIdle {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .character-attack {
      animation: attack 0.3s ease-out;
    }

    .boss-attack {
      animation: bossAttack 0.4s ease-out;
    }

    @keyframes attack {
      0% { transform: translateX(0); }
      50% { transform: translateX(50px); }
      100% { transform: translateX(0); }
    }

    @keyframes bossAttack {
      0% { transform: translateX(0) scale(1); }
      50% { transform: translateX(-30px) scale(1.1); }
      100% { transform: translateX(0) scale(1); }
    }

    .character-hit {
      animation: hit 0.3s ease-out;
    }

    .boss-hit {
      animation: hit 0.3s ease-out;
    }

    @keyframes hit {
      0%, 100% { filter: brightness(1); transform: translateX(0); }
      50% { filter: brightness(2) sepia(1) hue-rotate(-50deg); transform: translateX(10px); }
    }

    .hp-bar-container {
      width: 100%;
      height: 20px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      border: 2px solid rgba(255, 215, 0, 0.5);
      overflow: hidden;
    }

    .hp-bar {
      height: 100%;
      background: linear-gradient(90deg, #ef4444, #f97316, #22c55e);
      transition: width 0.3s ease-out;
    }

    .hp-text {
      font-size: 14px;
      color: #ffd700;
      margin-top: 5px;
      font-weight: bold;
    }

    .battle-vs {
      font-size: 36px;
      font-weight: bold;
      color: #ff6b00;
      text-shadow: 0 0 20px rgba(255, 107, 0, 0.5);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .damage-number {
      position: absolute;
      font-size: 32px;
      font-weight: bold;
      pointer-events: none;
      animation: damageFloat 1s ease-out forwards;
    }

    .damage-number.player {
      color: #ef4444;
      text-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
    }

    .damage-number.boss {
      color: #22c55e;
      text-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
    }

    @keyframes damageFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
    }

    .victory-screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .victory-screen.show {
      display: flex;
    }

    .victory-title {
      font-size: 48px;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
      animation: victoryPulse 1s ease-in-out infinite;
      margin-bottom: 30px;
    }

    @keyframes victoryPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .loot-container {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .loot-item {
      width: 100px;
      height: 100px;
      background: rgba(255, 215, 0, 0.1);
      border: 2px solid rgba(255, 215, 0, 0.5);
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: lootReveal 0.5s ease-out backwards;
    }

    .loot-item:nth-child(2) { animation-delay: 0.2s; }
    .loot-item:nth-child(3) { animation-delay: 0.4s; }

    @keyframes lootReveal {
      0% { opacity: 0; transform: scale(0) rotate(-180deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    .loot-icon {
      font-size: 40px;
      margin-bottom: 5px;
    }

    .loot-name {
      font-size: 12px;
      color: #ffd700;
      text-align: center;
    }

    .close-battle-btn {
      padding: 12px 30px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      transition: all 0.3s;
    }

    .close-battle-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 30px rgba(255, 215, 0, 0.7);
    }

    /* 响应式 */
    @media (max-width: 600px) {
      .equipment-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .balance-grid {
        grid-template-columns: 1fr;
      }
      .character-stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .inventory-grid {
        grid-template-columns: repeat(4, 1fr);
      }
      .game-tabs {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->

    // 连接钱包
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        showToast(t('toast_install_wallet'), 'error');
        return;
      }

      showLoading(true);
      try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send('eth_requestAccounts', []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        const network = await provider.getNetwork();
        if (network.chainId !== 56) {
          showToast(t('toast_switch_network'), 'error');
          showLoading(false);
          return;
        }

        koalaContract = new ethers.Contract(KOALA_ADDRESS, KOALA_ABI, signer);
        usdtContract = new ethers.Contract(USDT_ADDRESS, USDT_ABI, signer);

        try {
          await koalaContract.symbol();
        } catch (e) {
          showToast('考拉传奇币合约地址无效或合约尚未部署', 'error');
          showLoading(false);
          return;
        }

        document.getElementById('walletAddress').textContent =

        document.getElementById('connectBtn').textContent = t('nav_connected');
        document.getElementById('connectBtn').disabled = true;
        document.getElementById('rechargeBtn').disabled = false;
        document.getElementById('partnerBtn').disabled = false;
        document.getElementById('characterSection').style.display = 'block';

        initGame();

      } catch (e) {
        showToast(t('toast_connect_error') + e.message, 'error');
      }
      showLoading(false);

    // 充值传奇人生币
    async function rechargeKoala() {
      const amount = document.getElementById('rechargeAmount').value;
      if (!amount || amount <= 0) {
        showToast(t('toast_invalid_amount'), 'error');
        return;
      }

      showLoading(true);
      try {
        const decimals = await koalaContract.decimals();
        const amountWei = ethers.utils.parseUnits(amount, decimals);
        
        const allowance = await koalaContract.allowance(userAddress, RECEIVE_ADDRESS);
        if (allowance.lt(amountWei)) {
          showToast(t('toast_approving'), 'success');
          await koalaContract.approve(RECEIVE_ADDRESS, ethers.constants.MaxUint256);
        }

        showToast(t('toast_transferring'), 'success');
        const tx = await koalaContract.transfer(RECEIVE_ADDRESS, amountWei);
        await tx.wait();

        showToast(t('toast_recharge_success'), 'success');
        await updateBalances();
      } catch (e) {
        showToast(t('toast_recharge_error') + e.message, 'error');
      }
      showLoading(false);
    }

    // 更新游戏UI状态
    function updateGameUI() {
      equipmentData.forEach(e => {
        const items = document.querySelectorAll('.equipment-item');
        items.forEach(item => {
          if (item.onclick.toString().includes(e.id)) {
            if (currentKoalaBalance < e.cost || character.level < e.level) {
              item.classList.add('disabled');
            } else {
              item.classList.remove('disabled');
            }
          }
        });
      });

      const actions = document.querySelectorAll('.quest-action');
      actions.forEach(action => {
        action.classList.remove('disabled');
      });
    }

    // 合成装备
    async function synthesize(equipId) {
      const equip = equipmentData.find(e => e.id === equipId);
      if (!equip) return;

      if (character.level < equip.level) {
        showToast(t('toast_level_requirement') + equip.level, 'error');
        return;
      }

      if (currentKoalaBalance < equip.cost) {
        showToast(t('toast_balance_insufficient'), 'error');
        return;
      }

      showLoading(true);
      try {
        const decimals = await koalaContract.decimals();
        const costAmount = ethers.utils.parseUnits(equip.cost.toString(), decimals);
        
        const tx = await koalaContract.transfer(RECEIVE_ADDRESS, costAmount);
        await tx.wait();

        inventory.push(equip);
        character.atk += equip.atk || 0;
        character.def += equip.def || 0;
        character.hp += equip.hp || 0;
        character.exp += 50;

        updateCharacter();
        updateInventory();
        await updateBalances();

        showToast(t('toast_synthesize_success') + (equip.name[currentLang] || equip.name.zh), 'success');
      } catch (e) {
        showToast(t('toast_synthesize_error') + e.message, 'error');
      }
      showLoading(false);
    }

    // 执行任务
    async function doQuest(questId) {
      const quest = questData.find(q => q.id === questId);
      if (!quest) return;

      if (currentKoalaBalance < quest.cost) {
        showToast(t('toast_balance_insufficient'), 'error');
        return;
      }

      showLoading(true);
      try {
        const decimals = await koalaContract.decimals();
        const costAmount = ethers.utils.parseUnits(quest.cost.toString(), decimals);
        
        const tx = await koalaContract.transfer(RECEIVE_ADDRESS, costAmount);
        await tx.wait();

        character.exp += 100;
        if (character.exp >= character.level * 200) {
          character.level++;
          character.atk += 5;
          character.def += 3;
          character.hp += 20;
          showToast(t('toast_level_up') + character.level, 'success');
        }

        updateCharacter();
        await updateBalances();

        showToast(t('toast_quest_success') + (quest.name[currentLang] || quest.name.zh), 'success');
      } catch (e) {
        showToast(t('toast_quest_error') + e.message, 'error');
      }
      showLoading(false);
    }

    // BOSS挑战
    async function fightBoss(bossId) {
      const boss = bossData.find(b => b.id === bossId);
      if (!boss) return;

      if (currentKoalaBalance < boss.cost) {
        showToast(t('toast_balance_insufficient'), 'error');
        return;
      }

      showLoading(true);
      try {
        const decimals = await koalaContract.decimals();
        const costAmount = ethers.utils.parseUnits(boss.cost.toString(), decimals);
        
        const tx = await koalaContract.transfer(RECEIVE_ADDRESS, costAmount);
        await tx.wait();

        showLoading(false);
        await startBattleAnimation(boss);

        character.exp += 500;
        character.atk += 20;
        character.def += 10;
        character.hp += 50;

        if (character.exp >= character.level * 200) {
          character.level++;
          showToast(t('toast_level_up') + character.level, 'success');
        }

        updateCharacter();
        await updateBalances();

      } catch (e) {
        showLoading(false);
        showToast(t('toast_boss_error') + e.message, 'error');
      }
    }

    async function startBattleAnimation(boss) {
      showBattleScreen(boss);
      
      let playerHp = 100;
      let bossHp = 100;
      
      const playerHpBar = document.getElementById('playerHpBar');
      const bossHpBar = document.getElementById('bossHpBar');
      const playerHpText = document.getElementById('playerHpText');
      const bossHpText = document.getElementById('bossHpText');

      while (playerHp > 0 && bossHp > 0) {
        await new Promise(resolve => setTimeout(resolve, 800));
        
        const playerDamage = Math.floor(Math.random() * 15) + character.atk / 5;
        bossHp = Math.max(0, bossHp - playerDamage);
        
        animateAttack('player');
        await new Promise(resolve => setTimeout(resolve, 300));
        animateHit('boss');
        showDamage(Math.floor(playerDamage), 'boss');
        
        bossHpBar.style.width = bossHp + '%';
        bossHpText.textContent = Math.floor(bossHp) + '%';
        
        if (bossHp <= 0) break;

        await new Promise(resolve => setTimeout(resolve, 600));
        
        const bossDamage = Math.floor(Math.random() * 12) + 5;
        playerHp = Math.max(0, playerHp - bossDamage);
        
        animateAttack('boss');
        await new Promise(resolve => setTimeout(resolve, 300));
        animateHit('player');
        showDamage(Math.floor(bossDamage), 'player');
        
        playerHpBar.style.width = playerHp + '%';
        playerHpText.textContent = Math.floor(playerHp) + '%';
      }

      await new Promise(resolve => setTimeout(resolve, 500));
      
      const loots = generateLoot(boss);
      loots.forEach(loot => {
        inventory.push(loot);
        character.atk += loot.atk || 0;
        character.def += loot.def || 0;
        character.hp += loot.hp || 0;
      });
      
      updateInventory();
      showVictoryScreen(loots);
    }

    function showDamage(damage, target) {
      const arena = document.getElementById('battleArena');
      const damageEl = document.createElement('div');
      damageEl.className = `damage-number ${target}`;
      damageEl.textContent = '-' + damage;
      
      const targetEl = target === 'boss' ? document.getElementById('bossSprite') : document.getElementById('playerSprite');
      const rect = targetEl.getBoundingClientRect();
      const arenaRect = arena.getBoundingClientRect();
      
      damageEl.style.left = (rect.left - arenaRect.left + rect.width / 2 - 20) + 'px';
      damageEl.style.top = (rect.top - arenaRect.top) + 'px';
      
      arena.appendChild(damageEl);
      
      setTimeout(() => damageEl.remove(), 1000);
    }

    function animateAttack(target) {
      const sprite = target === 'player' ? document.getElementById('playerSprite') : document.getElementById('bossSprite');
      sprite.classList.add(target === 'player' ? 'character-attack' : 'boss-attack');
      setTimeout(() => sprite.classList.remove(target === 'player' ? 'character-attack' : 'boss-attack'), 300);
    }

    function animateHit(target) {
      const sprite = target === 'player' ? document.getElementById('playerSprite') : document.getElementById('bossSprite');
      sprite.classList.add(target === 'player' ? 'character-hit' : 'boss-hit');
      setTimeout(() => sprite.classList.remove(target === 'player' ? 'character-hit' : 'boss-hit'), 300);

    function showVictoryScreen(loots) {
      const victoryScreen = document.getElementById('victoryScreen');
      const lootContainer = document.getElementById('lootContainer');
      
      lootContainer.innerHTML = loots.map(item => `
        <div class="loot-item">

      victoryScreen.classList.add('show');

    function generateLoot(boss) {
      const lootCount = Math.floor(Math.random() * 3) + 1;
      const loots = [];
      
      const availableEquipment = equipmentData.filter(e => e.level <= character.level + 2);
      
      for (let i = 0; i < lootCount; i++) {
        if (availableEquipment.length > 0) {
          const randomIndex = Math.floor(Math.random() * availableEquipment.length);
          const loot = { ...availableEquipment[randomIndex] };
          loots.push(loot);
        }
      }
      
      return loots;
    }

    
  </script>
